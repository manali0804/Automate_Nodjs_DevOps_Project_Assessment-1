server {
    listen 80;
    server_name _;

    # PRODUCTION
    location / {
        proxy_pass http://localhost:3001;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    # STAGING
    location /staging/ {
        proxy_pass http://localhost:3002/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_cache_bypass $http_upgrade;
    }
}
