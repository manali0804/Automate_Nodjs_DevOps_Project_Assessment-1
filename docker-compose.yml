version: "3.9"

services:

  app:
    build: ./App
    container_name: node-app

    ports:
      - "3001:3001"

    env_file:
      - ./App/.env

    depends_on:
      - db

  db:
    image: postgres:15

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: proxy_container
    ports: 
      - "8081:80"
    volumes:
      - /home/manali/DevOps_project/nginx_configurtion/nginx.conf:/etc/nginx/conf.d/default.conf 

volumes:
  postgres-data:
