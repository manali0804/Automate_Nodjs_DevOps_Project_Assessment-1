global:
  scrape_interval: 15s

scrape_configs:
  # Monitor Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Monitor Node Exporter
  - job_name: "node_exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]  # On EC2, Node Exporter will use host network
